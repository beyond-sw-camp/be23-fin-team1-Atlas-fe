name: Discord Notify

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - closed

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          PUSH_COMPARE_URL: ${{ github.event.compare }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}

          PR_ACTION: ${{ github.event.action }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set."
            exit 1
          fi

          HOUR=$(TZ='Asia/Seoul' date +%H)
          DOW=$(TZ='Asia/Seoul' date +%u)
          QUIET=false

          # 주말은 하루 종일 조용한 뱃지
          if [ "$DOW" -eq 6 ] || [ "$DOW" -eq 7 ]; then
            QUIET=true
          fi

          # 평일은 18:00 ~ 다음날 08:00 조용한 뱃지
          if [ "$DOW" -ge 1 ] && [ "$DOW" -le 5 ]; then
            if [ "$HOUR" -ge 18 ] || [ "$HOUR" -lt 8 ]; then
              QUIET=true
            fi
          fi

          if [ "$EVENT_NAME" = "push" ]; then
            TITLE="${HEAD_COMMIT_MSG:-🚀 main 브랜치 push}"
            URL="$PUSH_COMPARE_URL"
            DESCRIPTION="main 브랜치에 변경이 반영되었습니다."

            PAYLOAD=$(jq -n \
              --arg title "$TITLE" \
              --arg url "$URL" \
              --arg description "$DESCRIPTION" \
              --arg repo "$REPOSITORY" \
              --arg actor "$ACTOR" \
              --arg branch "$REF_NAME" \
              '{
                embeds: [
                  {
                    title: $title,
                    url: $url,
                    description: $description,
                    fields: [
                      { name: "📦 저장소", value: $repo, inline: false },
                      { name: "👤 작성자", value: $actor, inline: false },
                      { name: "🌿 브랜치", value: $branch, inline: false }
                    ]
                  }
                ]
              }')

          elif [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$PR_ACTION" = "opened" ]; then
              FOOTER_TEXT="📌 PR 생성"
              DESCRIPTION="새 Pull Request가 생성되었습니다."
            elif [ "$PR_ACTION" = "closed" ] && [ "$PR_MERGED" = "true" ]; then
              FOOTER_TEXT="✅ PR 머지 완료"
              DESCRIPTION="Pull Request가 머지되었습니다."
            else
              exit 0
            fi

            PAYLOAD=$(jq -n \
              --arg title "$PR_TITLE" \
              --arg url "$PR_URL" \
              --arg description "$DESCRIPTION" \
              --arg actor "$ACTOR" \
              --arg repo "$REPOSITORY" \
              --arg head "$PR_HEAD" \
              --arg base "$PR_BASE" \
              --arg footer_text "$FOOTER_TEXT" \
              '{
                embeds: [
                  {
                    title: $title,
                    url: $url,
                    description: $description,
                    fields: [
                      { name: "📦 저장소", value: $repo, inline: false },
                      { name: "👤 작성자", value: $actor, inline: false },
                      { name: "🌿 브랜치", value: ($head + " → " + $base), inline: false }
                    ],
                    footer: {
                      text: $footer_text
                    }
                  }
                ]
              }')
          else
            exit 0
          fi

          if [ "$QUIET" = true ]; then
            PAYLOAD=$(echo "$PAYLOAD" | jq '. + {flags: 4096}')
          fi

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
